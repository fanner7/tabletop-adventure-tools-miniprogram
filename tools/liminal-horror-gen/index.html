<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阈限恐怖 调查员生成器 (JSON版)</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg-color: #ffffff;
            --text-color: #212529;
            --primary-color: #007bff;
            --primary-hover-color: #0056b3;
            --secondary-color: #6c757d;
            --secondary-hover-color: #5a6268;
            --border-color: #dee2e6;
            --shadow-color: rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        h1 {
            margin: 0;
            font-size: 1.8em;
        }

        h2 {
            font-size: 1.3em;
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 5px;
            margin-top: 25px;
        }

        .generator-button {
            display: block;
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            font-weight: bold;
            color: #fff;
            background-color: var(--primary-color);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 25px;
            transition: background-color 0.2s ease;
        }

        .generator-button:hover, .generator-button:focus {
            background-color: var(--primary-hover-color);
            outline: none;
        }
        
        .character-sheet {
            background-color: var(--card-bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px var(--shadow-color);
            margin-bottom: 30px;
        }

        .section {
            margin-bottom: 15px;
        }
        
        .section-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }

        .stat-block {
            background-color: var(--bg-color);
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }
        
        .stat-block strong {
            display: block;
            font-size: 0.9em;
            color: #6c757d;
        }
        
        .stat-block span {
            font-size: 2em;
            font-weight: bold;
        }

        .info-block {
            padding-bottom: 10px;
            margin-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        
        .info-block:last-child { border-bottom: none; }
        
        .info-block strong { color: #495057; }

        /* --- JSON Export Styles --- */
        .json-export-area {
            background-color: var(--card-bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px var(--shadow-color);
        }
        .json-export-area textarea {
            width: 100%;
            min-height: 200px;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px;
            font-family: monospace;
            font-size: 0.9em;
            resize: vertical;
            background-color: #e9ecef;
            color: #495057;
        }
        .json-export-area .copy-button {
            display: block;
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            font-size: 1em;
            font-weight: bold;
            color: #fff;
            background-color: var(--secondary-color);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        .json-export-area .copy-button:hover {
            background-color: var(--secondary-hover-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>阈限恐怖 调查员生成器</h1>
        </header>

        <button id="generateBtn" class="generator-button">重新生成</button>

        <div id="character-sheet" class="character-sheet">
            </div>

        <div class="json-export-area">
             <h2>分享角色数据 (JSON)</h2>
             <textarea id="jsonOutput" readonly placeholder="点击上方按钮生成角色数据..."></textarea>
             <button id="copyJsonBtn" class="copy-button">复制JSON</button>
        </div>
    </div>

    <script>
        const backgrounds = [
            "流水线工人： 工业围裙（+1 护甲），安全背带，保温瓶。", "公交司机： 饭盒，交通路线图，电击枪（d6，非致命）。", "机械师： 活动扳手（d6），便携工具箱，电工胶带，刹车清洁剂。", "拾荒家： 防割手套（+1 护甲），反光背心，拾物器，护目镜。", "救护员： 急救包，创伤剪，听诊器，卫生袋。", "店员： 开箱刀（d6），对讲机，胸牌，舒适无比的鞋子。", "艺术家： 自选艺术工具，笔记本，相机，小型热情粉丝圈。", "运动员： 自选运动器材，汗带，运动饮料粉。", "滑板手： 滑板，摄像机，断线钳。", "键盘侠： 笔记本电脑及背包，网络粉丝，假证件，能量饮料。", "志愿消防员： 折叠梯（笨重），斧头（d6），灭火器，手电筒。", "单车快递员： 自行车，头盔（+1 护甲），邮差包，未拆封包裹，多功能工具。", "酒保： 酒吧刀（d6），酒瓶，香烟，查获的假证件。", "治疗师： 录音笔，笔记本和钢笔，名片，小左轮枪（d6）。", "行政助理： 广泛人脉，公司信用卡，折叠公文包，电击枪（d6 敏捷）。", "演员： 试镜文件夹，便携充电器，备用化妆品，替换衣物。", "工程师： 笔记本电脑及设计软件，防水笔记本，无线路由器，九九新安全防具。", "社工： 笔记本电脑及背包，证件，折叠刀（d6），笔记本和钢笔。", "教师： 咖啡杯，剪刀，大包。", "承包商： 满载工具腰带，美工刀（d6），探照灯，钻机。"
        ];
        const appearances = [ "随时商务", "街头风", "乐队文化恤", "统统涂黑", "运动休闲", "清爽熨烫", "休闲舒适", "正宗复古", "风靡一时", "工作制服", "超大码卫衣", "海岛花风情", "量身定制", "实用胜于时尚", "货运口袋", "牛仔配 T 恤", "犹在 2009", "粗犷极简", "千禧虫", "牛仔裤搭牛仔衫" ];
        const firstEncounters = [ "在神秘事况下痛失所爱。", "网上证据太多，不容忽视。", "在黑暗中看见了什么东西。", "幸存于一次无法解释的袭击。", "有东西潜伏在梦里。", "身边某人正在拉你入伙，或是赶你远离。", "异教活动（或许他们招募了重要人物）。", "秘密社团的持卡会员。", "你读到了一些凡人无法理解的材料。", "还没，所以来跑团！" ];
        const ideologies = [ "世间万事都有植根于科学的合理解释。", "个人可以有所作为。", "认同某种特定政治意识形态。", "特定宗教指引着你。", "道德是非黑白的。", "你相信命运直接影响你的生活。", "相信更高的力量，譬如占星术、灵修等。", "自由意志是唯一真理。", "世人皆醉我独醒。答案就在眼前。", "相信社群的力量。" ];
        const traits = { physique: ["运动", "健硕", "曲线", "瘦长", "小巧", "僵硬", "矮胖", "高耸", "健壮", "丰满"], face: ["骨感", "破碎", "棱角", "拉长", "酒窝", "完美", "圆润", "锋利", "难忘", "易忘"], speech: ["粗钝", "沙哑", "洪亮", "严谨", "隐晦", "尖锐", "正式", "口音", "单调", "生涩"], virtue: ["诚实", "荣耀", "谨慎", "谦逊", "勇敢", "仁慈", "自律", "沉着", "合群", "宽容"], vice: ["易怒", "懒惰", "悲观", "紧张", "怯懦", "粗鲁", "狡诈", "虚荣", "贪婪", "记仇"], misfortune: ["遗弃", "遇骗", "成瘾", "降职", "勒索", "辱没", "蒙罪", "决裂", "诅咒", "流放"] };

        function rollDie(sides) { return Math.floor(Math.random() * sides) + 1; }
        function rollDice(count, sides) { let total = 0; for (let i = 0; i < count; i++) { total += rollDie(sides); } return total; }
        function getRandomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        function generateCharacter() {
            // --- 1. GENERATE ALL CHARACTER DATA ---
            const strength = rollDice(3, 6);
            const agility = rollDice(3, 6);
            const will = rollDice(3, 6);
            const hp = rollDie(6);
            const cash = rollDie(6) * 100;
            const backgroundString = getRandomItem(backgrounds);
            const appearance = getRandomItem(appearances);
            const firstEncounter = getRandomItem(firstEncounters);
            const ideology = getRandomItem(ideologies);
            const traitIndex = rollDie(10) - 1;

            // --- 2. PARSE DATA AND CREATE JSON OBJECT ---
            const backgroundName = backgroundString.split('：')[0];
            let armor = 0;
            if (backgroundString.includes('护甲')) {
                const armorMatch = backgroundString.match(/\+(\d+)\s*护甲/);
                if (armorMatch) armor = parseInt(armorMatch[1], 10);
            }
            
            const items = ['智能手机'];
            const backgroundItemsString = backgroundString.split('：')[1] ? backgroundString.split('：')[1].replace(/。$/, '').trim() : '';
            if(backgroundItemsString) {
                const backgroundItems = backgroundItemsString.split('，').map(item => item.trim());
                items.push(...backgroundItems);
            }

            const characterData = {
                name: "",
                background: backgroundName,
                attributes: {
                    strength: { current: strength, max: strength },
                    agility: { current: agility, max: agility },
                    will: { current: will, max: will }
                },
                hp: { current: hp, max: hp },
                status: {
                    armor: armor,
                    stability: 0,
                    deprived: ""
                },
                money: cash,
                inventory: items.slice(0, 10), // Ensure it doesn't exceed 10 slots
                details: {
                    appearance: appearance,
                    firstEncounter: firstEncounter,
                    ideology: ideology,
                    traits: {
                        physique: traits.physique[traitIndex],
                        face: traits.face[traitIndex],
                        speech: traits.speech[traitIndex],
                        virtue: traits.virtue[traitIndex],
                        vice: traits.vice[traitIndex],
                        misfortune: traits.misfortune[traitIndex]
                    }
                },
                notes: ""
            };

            // --- 3. RENDER THE SIMPLE DISPLAY SHEET ---
            const sheet = document.getElementById('character-sheet');
            sheet.innerHTML = `
                <h2>核心属性</h2>
                <div class="section-grid">
                    <div class="stat-block"><strong>力量</strong> <span>${strength}</span></div>
                    <div class="stat-block"><strong>敏捷</strong> <span>${agility}</span></div>
                    <div class="stat-block"><strong>意志</strong> <span>${will}</span></div>
                </div>
                <div class="section-grid" style="margin-top: 15px;">
                    <div class="stat-block"><strong>耐久度 (HP)</strong> <span>${hp}</span></div>
                    <div class="stat-block"><strong>现金</strong> <span>¥${cash}</span></div>
                </div>
                <h2>初始信息</h2>
                <div class="section">
                    <div class="info-block"><strong>出身:</strong> <span>${backgroundString}</span></div>
                    <div class="info-block"><strong>固定装备:</strong> <span>智能手机</span></div>
                </div>
                <h2>调查员细节</h2>
                <div class="section">
                    <div class="info-block"><strong>外观:</strong> <span>${appearance}</span></div>
                    <div class="info-block"><strong>特质:</strong> <span>体格[${traits.physique[traitIndex]}], 面容[${traits.face[traitIndex]}], 言谈[${traits.speech[traitIndex]}], 美德[${traits.virtue[traitIndex]}], 缺陷[${traits.vice[traitIndex]}], 厄运[${traits.misfortune[traitIndex]}]</span></div>
                    <div class="info-block"><strong>深渊回眸:</strong> <span>${firstEncounter}</span></div>
                    <div class="info-block"><strong>意识形态:</strong> <span>${ideology}</span></div>
                </div>`;
            
            // --- 4. POPULATE THE JSON EXPORT AREA ---
            const jsonOutput = document.getElementById('jsonOutput');
            jsonOutput.value = JSON.stringify(characterData, null, 2);
        }

        // --- EVENT LISTENERS ---
        document.getElementById('generateBtn').addEventListener('click', generateCharacter);

        document.getElementById('copyJsonBtn').addEventListener('click', () => {
            const jsonOutput = document.getElementById('jsonOutput');
            const copyBtn = document.getElementById('copyJsonBtn');

            if (!jsonOutput.value) return; // Don't copy if empty

            navigator.clipboard.writeText(jsonOutput.value).then(() => {
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '已复制！';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            }).catch(err => {
                console.error('无法复制文本: ', err);
                alert('复制失败，请手动复制。');
            });
        });

        // Generate a character on initial page load
        window.addEventListener('load', generateCharacter);
    </script>
</body>
</html>
