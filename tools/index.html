<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具箱</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- 全局样式设置 --- */
        :root {
            /* 这里的颜色可以自己改 */
            --bg-color: #1a1b26;
            /* 背景深色 */
            --card-bg: #24283b;
            /* 卡片背景色 */
            --text-color: #c0caf5;
            /* 主要文字颜色 */
            --accent-color: #7aa2f7;
            /* 强调色(蓝色) */
            --hover-color: #bb9af7;
            /* 鼠标悬停色(紫色) */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- 头部标题区域 --- */
        header {
            text-align: center;
            padding: 60px 20px 40px;
            max-width: 800px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #fff;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        /* --- 核心：弹性卡片容器 --- */
        .container {
            display: flex;
            flex-wrap: wrap;
            /* 允许换行，这是适配手机的关键 */
            justify-content: center;
            /* 卡片居中 */
            gap: 20px;
            /* 卡片之间的间距 */
            padding: 20px;
            max-width: 1200px;
            width: 100%;
            box-sizing: border-box;
        }

        /* --- 卡片样式设计 --- */
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            width: 280px;
            /* 卡片基准宽度 */
            text-decoration: none;
            /* 去掉链接下划线 */
            color: var(--text-color);
            transition: transform 0.3s, box-shadow 0.3s, border 0.3s;
            border: 1px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* 手机端适配：当屏幕小于 600px 时，卡片占满宽度 */
        @media (max-width: 600px) {
            .card {
                width: 100%;
            }
        }

        /* 卡片悬停效果 */
        .card:hover {
            transform: translateY(-5px);
            /* 向上浮动 */
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            border-color: var(--accent-color);
        }

        .card i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: var(--accent-color);
            transition: color 0.3s;
        }

        .card:hover i {
            color: var(--hover-color);
        }

        .card h3 {
            margin: 10px 0;
            font-size: 1.2rem;
            color: #fff;
        }

        .card p {
            font-size: 0.9rem;
            line-height: 1.5;
            opacity: 0.7;
            margin: 0;
        }

        /* --- 底部区域 --- */
        footer {
            margin-top: auto;
            padding: 40px;
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.5;
        }

        /* 返回博客的小链接样式 */
        .back-link {
            display: inline-block;
            margin-top: 10px;
            color: var(--accent-color);
            text-decoration: none;
            border-bottom: 1px dashed var(--accent-color);
        }
    </style>
</head>

<body>

    <header>
        <h1><i class="fa-solid fa-dice-d20"></i> 桌游兴趣小组工具箱</h1>
        <p class="subtitle">这里存放着跑团常用的辅助工具与规则速查</p>
        <!-- <a href="/blog/" class="back-link">← 返回博客文章区</a> -->
    </header>

    <main class="container">

        <a href="/tools/liminal-horror-gen/" class="card" target="_blank">
            <i class="fa-solid fa-ghost"></i>
            <h3>阈限恐怖·调查员生成</h3>
            <p>快速生成 Liminal Horror 角色，包含属性与初始装备。</p>
        </a>

        <a href="/tools/liminal-horror-gen-bloom/" class="card" target="_blank">
            <i class="fa-solid fa-flask"></i>
            <h3>阈限恐怖·生成器 (繁孽版)</h3>
            <p>基于模组的版本。</p>
        </a>

        <a href="/tools/tes-botse-skills/" class="card" target="_blank">
            <i class="fa-solid fa-dragon"></i>
            <h3>TES: BotSE 技能速查</h3>
            <p>上古卷轴：第二纪元的背叛 - 技能速查工具。</p>
        </a>

    </main>

    <footer>
        <p>© 2026 Fanner7 桌游兴趣小组 | Keep Rolling</p>
    </footer>

</body>

</html>
